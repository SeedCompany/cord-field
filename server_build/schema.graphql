    For example, with a `collapseAfter` value of 2:
    `Genesis 1:2, 1:5, 1:7, 1:9` becomes `Genesis 1:2, 1:5 and 2 other portions`
    with a `collapseAfter` value of 0 or less:
    `Genesis 1:2, 1:5, 1:7, 1:9` remains the same.
