interface Media {
  """
  A description of this media for accessibility, especially for screen readers.
  It should convey this media's content and function.
  
  Example:
    A beautiful sunset over a serene lake with silhouettes of trees.
  """
  altText: String

  """
  A title or brief explanation accompanying this media.
  It could add information that the media does not directly convey.
  
  Example:
    Sunset over Lake Serenity, where locals come to relax and enjoy the view.
  """
  caption: String
  file: FileVersion!
  id: ID!
  mimeType: String!

  """
  A url to the file.
  
  This url could require authentication.
  """
  url(
    """
    Whether the browser should download this file if opened directly
    
    This sets the `Content-Disposition` header to `attachment` instead of `inline`.
    https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Disposition
    """
    download: Boolean! = false

    """The kind of url to generate."""
    kind: FileUrlKind! = Permanent

    """
    Override the name of the file.
    
    The file extension is appended to this.
    """
    name: String
  ): URL!
}

