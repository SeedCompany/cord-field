  A human readable label for this range.
  
  Examples:
    - Matthew
    - Matthew 1
    - Matthew 1-4
    - Matthew 1:1
    - Matthew 1:1-20
    - Matthew 1:1-4:21
    - Matthew-John
    - Matthew 1-John 2
    - Matthew 1:1-John 2:4
  """
  label: String!

  """The starting point"""
  start: ScriptureReference!

  """The total number of verse equivalents in this scripture range"""
  totalVerseEquivalents: Float!

  """The total number of verses in this scripture range"""
  totalVerses: Int!
}

