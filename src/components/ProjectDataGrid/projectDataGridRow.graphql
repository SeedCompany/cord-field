fragment projectDataGridRow on Project {
  id
  type
  ...ProjectLookupItem
  sensitivity
  status
  step {
    value
  }
  engagements {
    total
  }
  primaryLocation {
    value {
      id
      name {
        value
      }
    }
  }
  fieldRegion {
    value {
      id
      name {
        value
      }
    }
  }
  mouStart {
    value
  }
  mouEnd {
    value
  }
  primaryPartnership {
    value {
      id
      partner {
        value {
          id
          organization {
            value {
              id
              name {
                value
              }
            }
          }
        }
      }
    }
  }

  isMember
  pinned
}
