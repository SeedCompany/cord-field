query LanguageProjects($languageId: ID!, $input: ProjectListInput) {
  language(id: $languageId) {
    id
    projects(input: $input) {
      canRead
      hasMore
      total
      items {
        ...languageProjectDataGridRow
      }
    }
  }
}

fragment languageProjectDataGridRow on Project {
  ...projectDataGridRow
}
