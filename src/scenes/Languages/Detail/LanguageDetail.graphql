query Language($languageId: ID!) @live {
  language(id: $languageId) {
    ...LanguageDetail
    ...LanguageForm
  }
}

fragment LanguageDetail on Language {
  id
  createdAt
  publicName
  name {
    canRead
    canEdit
    value
  }
  displayName {
    canRead
    canEdit
    value
  }
  displayNamePronunciation {
    canRead
    canEdit
    value
  }
  isDialect {
    canRead
    canEdit
    value
  }
  ...LeastOfThese
  ethnologue {
    code {
      canRead
      canEdit
      value
    }
    provisionalCode {
      canRead
      canEdit
      value
    }
    name {
      canRead
      canEdit
      value
    }
  }
  registryOfLanguageVarietiesCode {
    canRead
    canEdit
    value
  }
  sponsorStartDate {
    canRead
    canEdit
    value
  }
  usesAIAssistance {
    canRead
    canEdit
    value
  }
  sensitivity
  avatarLetters
  population {
    canRead
    canEdit
    value
  }
  locations {
    canRead
    canCreate
  }
  projects {
    canRead
  }
  posts {
    canRead
  }
  ...FirstScripture
  ...TogglePin
}
