mutation UpdateUser($input: UpdateUser!) {
  updateUser(input: $input) {
    user {
      ...DisplayUser
      ...UserForm
    }
  }
}

mutation EditUserOrganization(
  $userId: ID!
  $newOrgId: ID!
  $oldOrgId: ID!
  $doAssign: Boolean!
  $doRemove: Boolean!
) {
  removeOrganizationFromUser(user: $userId, org: $oldOrgId)
    @include(if: $doRemove) {
    user {
      id
    }
  }
  assignOrganizationToUser(user: $userId, org: $newOrgId)
    @include(if: $doAssign) {
    user {
      id
    }
  }
}
