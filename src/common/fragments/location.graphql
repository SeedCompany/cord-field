fragment DisplayLocation on Location {
  id
  name {
    canRead
    canEdit
    value
  }
}

fragment DisplayMarketingRegion on Location {
  ...DisplayLocation
  type {
    canRead
    value
  }
}

fragment DisplayFieldRegion on FieldRegion {
  id
  name {
    value
  }
}

fragment DisplayFieldZone on FieldZone {
  id
  name {
    value
  }
}
